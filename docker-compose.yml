services:
    buildkit:
        image: moby/buildkit:latest
        command:
            [
                "--addr",
                "tcp://0.0.0.0:1234",
                "--root",
                "/var/lib/buildkit",
            ]
        privileged: true
        volumes:
            - buildkit-data:/var/lib/buildkit
        networks:
            dequel:
                aliases:
                    - buildkit
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--spider",
                    "-q",
                    "tcp://localhost:1234",
                ]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 5s

    api:
        build:
            context: ./apps/api
        environment:
            PORT: 3001
            DATABASE_PATH: /app/data/dequel.db
            WORKSPACE_ROOT: /app/workspace
            CADDY_ROUTES_DIR: /caddy/routes
            CADDY_INGRESS_BASE: http://localhost
            DOCKER_NETWORK: dequel_net
            APP_INTERNAL_PORT: 3000
            BUILDKIT_HOST: tcp://buildkit:1234
            DOCKER_BIN: /usr/bin/docker
            RAILPACK_VERBOSE: "1"
            RAILPACK_BUILD_TIMEOUT_MS: "1200000"
        volumes:
            - ./data:/app/data
            - ./workspace:/app/workspace
            - ./infra/caddy/routes:/caddy/routes
            - /var/run/docker.sock:/var/run/docker.sock
        depends_on:
            buildkit:
                condition: service_started
        healthcheck:
            test:
                [
                    "CMD",
                    "curl",
                    "-fsS",
                    "http://localhost:3001/api/health",
                ]
            interval: 50s
            timeout: 3s
            retries: 100
            start_period: 10s
        networks:
            dequel:
                aliases:
                    - api

    web:
        build:
            context: ./apps/web
        healthcheck:
            test:
                [
                    "CMD",
                    "bun",
                    "-e",
                    "fetch('http://localhost:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
                ]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 30s
        networks:
            dequel:
                aliases:
                    - web

    caddy:
        image: caddy:2.8-alpine
        command:
            [
                "caddy",
                "run",
                "--config",
                "/etc/caddy/Caddyfile",
                "--adapter",
                "caddyfile",
                "--watch",
            ]
        ports:
            - "80:80"
        volumes:
            - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
            - ./infra/caddy/routes:/etc/caddy/routes
        depends_on:
            api:
                condition: service_healthy
            web:
                condition: service_healthy
        networks:
            dequel:

    redis:
        image: redis:7-alpine
        command: redis-server --appendonly yes
        volumes:
            - redis-data:/data
        networks:
            dequel:
                aliases:
                    - redis
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 5

    cadvisor:
        image: gcr.io/cadvisor/cadvisor:latest
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
        privileged: true
        devices:
            - /dev/kmsg
        networks:
            dequel:
                aliases:
                    - cadvisor
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/metrics"]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 5s

    prometheus:
        image: prom/prometheus:latest
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.console.libraries=/usr/share/prometheus/console_libraries
            - --web.console.templates=/usr/share/prometheus/consoles
            - --storage.tsdb.retention.time=30d
        volumes:
            - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus
        depends_on:
            cadvisor:
                condition: service_started
        networks:
            dequel:
                aliases:
                    - prometheus
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 5s

    loki:
        image: grafana/loki:3.0.0
        command:
            - -config.file=/etc/loki/loki-config.yml
        volumes:
            - ./infra/monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki-data:/loki
        networks:
            dequel:
                aliases:
                    - loki
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 10s

    promtail:
        image: grafana/promtail:3.0.0
        command:
            - -config.file=/etc/promtail/promtail-config.yml
        volumes:
            - ./infra/monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_started
        networks:
            dequel:

    grafana:
        image: grafana/grafana:latest
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
            GF_SERVER_ROOT_URL: http://localhost/grafana
            GF_SERVER_SERVE_FROM_SUB_PATH: "true"
            GF_INSTALL_PLUGINS: ""
        volumes:
            - ./infra/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
            - grafana-data:/var/lib/grafana
        depends_on:
            prometheus:
                condition: service_started
            loki:
                condition: service_started
        networks:
            dequel:
                aliases:
                    - grafana
        healthcheck:
            test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 15s

networks:
    dequel:
        name: dequel_net

volumes:
    buildkit-data:
    redis-data:
    prometheus-data:
    loki-data:
    grafana-data:
