name: Feature Request
description: Suggest an idea for Dequel
title: "[Feature]: "
labels: ["enhancement"]
projects: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for Dequel. Please describe your idea clearly so we can understand the use case.

  - type: checkboxes
    attributes:
      label: Is there an existing feature request for this?
      description: Please search to see if a similar feature request already exists.
      options:
        - label: I have searched the existing issues and found nothing matching
          required: true

  - type: textarea
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe what you're trying to solve.
      placeholder: I'm frustrated when [...] because [...] / I wish I could [...]
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen. Be as specific as possible.
      placeholder: The system should [...]. This could work by [...]
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternative Solutions
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: I also considered [...], but it doesn't work because [...]
    validations:
      required: false

  - type: dropdown
    attributes:
      label: Affected Component
      description: Which component of Dequel would this affect?
      multiple: true
      options:
        - API (Backend)
        - Web Dashboard (Frontend)
        - Docs
        - CLI / Install Script
        - Build System (Railpack / BuildKit)
        - Caddy / Ingress
        - Monitoring (Prometheus / Grafana / Loki)
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Mockups / Examples
      description: |
        If applicable, add mockups, diagrams, or examples from other projects that demonstrate the feature.
        Tip: You can attach images by clicking this area and dragging files in.
      placeholder: Drag and drop images or paste links to references...

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: Any additional information...

  - type: checkboxes
    attributes:
      label: Would you be willing to contribute this feature?
      description: Let us know if you'd like to help implement this yourself.
      options:
        - label: Yes, I'd be happy to submit a PR for this feature
          required: false

  - type: markdown
    attributes:
      value: |
        ---
        Before submitting, please ensure you've filled out all required fields marked with *.
