name: Bug Report
description: File a bug report to help us improve Dequel
title: "[Bug]: "
labels: ["bug", "triage"]
projects: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please provide as much detail as possible.

  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for the bug you encountered.
      options:
        - label: I have searched the existing issues and found nothing matching
          required: true

  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: I expected X to happen...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screenshots / Logs
      description: |
        If applicable, add screenshots or relevant logs to help explain your problem.
        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
      placeholder: Drag and drop screenshots or paste log output here...

  - type: dropdown
    attributes:
      label: Affected Component
      description: Which component of Dequel is affected?
      multiple: true
      options:
        - API (Backend)
        - Web Dashboard (Frontend)
        - Docs
        - CLI / Install Script
        - Docker / Deployment
        - Build System (Railpack / BuildKit)
        - Caddy / Ingress
        - Monitoring (Prometheus / Grafana / Loki)
        - Other
    validations:
      required: true

  - type: input
    attributes:
      label: Dequel Version
      description: What version of Dequel are you running? (Check `VERSION` or `scripts/dequel status`)
      placeholder: e.g. v0.1.0
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      description: |
        Examples:
          - **OS**: Ubuntu 22.04
          - **Docker**: 24.0.7
          - **Bun**: 1.1.0
          - **Browser**: Chrome 125
          - **Deployment**: Docker Compose / Bare metal
      value: |
        - OS:
        - Docker version:
        - Bun version (if relevant):
        - Browser (if relevant):
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. related issues, workarounds, research).
      placeholder: Any additional context...

  - type: markdown
    attributes:
      value: |
        ---
        Before submitting, please ensure you've filled out all required fields marked with *.
